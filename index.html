<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gerald Jonathan William — website pribadi, bukan buat sombong." />
  <meta name="author" content="Gerald Jonathan William" />
  <title>Gerald's Private Web</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════
       LOADER
  ══════════════════ -->
  <div id="loader" aria-hidden="true">
    <div class="loader-wrap">
      <div class="loader-title">Gerald's Private Web</div>
      <div class="loader-track">
        <div class="loader-fill"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════════
       HERO
  ══════════════════ -->
  <section id="hero">

    <div class="hero-bg-img" id="heroBg"></div>
    <div class="hero-bg-overlay"></div>

    <div class="hero-inner">
      <div class="hero-card" id="heroCard">

        <div class="hero-badge">
          <span class="badge-dot"></span>
          Gerald's Private Web
        </div>

        <h1 class="hero-name">
          <span class="line-1">Gerald Jonathan William</span>
          <span class="line-2">Website Pribadi</span>
        </h1>

        <p class="hero-tagline">
          "Hanyalah website gabut, portfolio mah serah, mau cuma profil aja ya serah,
          ga ada bermaksud buat sombong"
        </p>

        <div class="hero-rule"></div>

        <div class="hero-meta">
          <span class="hero-meta-tag">Personal</span>
          <span class="hero-meta-tag">2026</span>
          <span class="hero-meta-tag">Gerald Jonathan William</span>
        </div>

      </div>
    </div>

    <div class="hero-scroll-hint" id="scrollHint" role="button" tabindex="0" aria-label="Scroll ke bawah">
      <span>Scroll</span>
      <div class="hint-line"></div>
    </div>

  </section>

  <!-- ══════════════════
       DESKRIPSI
  ══════════════════ -->
  <section id="deskripsi">
    <div class="desk-wrap">

      <div class="desk-eyebrow reveal">Tentang</div>

      <div class="desk-card reveal" id="deskCard">
        <div id="deskContent">
          <p class="desk-empty">Memuat...</p>
        </div>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
